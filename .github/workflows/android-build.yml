name: Android CI - 自动编译APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: 授予gradlew执行权限
      run: chmod +x gradlew

    - name: 编译Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: 编译Release APK
      run: ./gradlew assembleRelease --stacktrace

    - name: 上传Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: xiaoxun-xiangqi-debug
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: 上传Release APK
      uses: actions/upload-artifact@v4
      with:
        name: xiaoxun-xiangqi-release
        path: app/build/outputs/apk/release/app-release-unsigned.apk
        retention-days: 30

    - name: 生成编译报告
      if: always()
      run: |
        echo "## 编译完成 🎉" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### APK文件已生成:" >> $GITHUB_STEP_SUMMARY
        echo "- Debug版本: app-debug.apk" >> $GITHUB_STEP_SUMMARY
        echo "- Release版本: app-release-unsigned.apk" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "请在Actions页面下载构建产物(Artifacts)" >> $GITHUB_STEP_SUMMARY
